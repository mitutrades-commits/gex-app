<html lang="en">
<head>

<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>GEX Ladder Dashboard — SPX · SPY · QQQ</title>
<style>

  :root {
    --bg:          #0b0e13;
    --surface:     #111520;
    --surface-2:   #161c28;
    --border:      #1e2736;
    --border-soft: #161d2b;
    --green:       #2dc88a;
    --red:         #e05252;
    --blue:        #4d8fea;
    --amber:       #d4a843;
    --text-1:      #d8e0ec;
    --text-2:      #7a8aa8;
    --text-3:      #44556e;
  }

  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background: var(--bg);
    color: var(--text-1);
    font-family: 'IBM Plex Sans', sans-serif;
    min-height: 100vh;
    padding: 28px 20px 48px;
  }

  /* ── PAGE HEADER ── */
  .page-header {
    display: flex;
    justify-content: space-between;
    align-items: flex-end;
    border-bottom: 1px solid var(--border);
    padding-bottom: 14px;
    margin-bottom: 20px;
  }

  .page-header .title {
    font-size: 14px;
    font-weight: 600;
    letter-spacing: 0.03em;
    color: var(--text-1);
  }

  .page-header .subtitle {
    font-family: 'IBM Plex Mono', monospace;
    font-size: 9px;
    color: var(--text-3);
    letter-spacing: 0.1em;
    text-transform: uppercase;
    margin-top: 3px;
  }

  .page-header .ts {
    font-family: 'IBM Plex Mono', monospace;
    font-size: 9px;
    color: var(--text-3);
    letter-spacing: 0.05em;
    text-align: right;
  }

  /* ── 3-COLUMN GRID ── */
  .grid {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 12px;
    align-items: start;
  }

  /* ── INSTRUMENT COLUMN ── */
  .col {
    display: flex;
    flex-direction: column;
    gap: 8px;
  }

  /* ── STAT CARDS ── */
  .stat-row {
    display: grid;
    grid-template-columns: 1fr 1fr 1fr 1fr;
    gap: 4px;
  }

  .stat-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 3px;
    padding: 10px 12px;
    position: relative;
    overflow: hidden;
  }

  .stat-card::before {
    content: '';
    position: absolute;
    top: 0; left: 0; right: 0;
    height: 2px;
  }

  .stat-card.call::before  { background: var(--green); }
  .stat-card.flip::before  { background: var(--blue); }
  .stat-card.put::before   { background: var(--red); }
  .stat-card.pin::before   { background: var(--amber); }

  .sc-label {
    font-family: 'IBM Plex Mono', monospace;
    font-size: 8px;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    color: var(--text-3);
    margin-bottom: 5px;
  }

  .sc-value {
    font-family: 'IBM Plex Mono', monospace;
    font-size: 15px;
    font-weight: 500;
    letter-spacing: 0.01em;
    line-height: 1;
    margin-bottom: 4px;
  }

  .stat-card.call .sc-value { color: var(--green); }
  .stat-card.flip .sc-value { color: var(--blue); }
  .stat-card.put  .sc-value { color: var(--red); }
  .stat-card.pin  .sc-value { color: var(--amber); }

  .sc-sub {
    font-family: 'IBM Plex Mono', monospace;
    font-size: 8px;
    color: var(--text-3);
    letter-spacing: 0.03em;
    line-height: 1.4;
  }

  /* ── CHART BOX ── */
  .chart-box {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 3px;
    overflow: hidden;
  }

  /* ── COLUMN HEADER ── */
  .col-header {
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding: 10px 14px;
    background: var(--surface-2);
    border-bottom: 1px solid var(--border);
  }

  .col-header .sym {
    font-family: 'IBM Plex Mono', monospace;
    font-size: 13px;
    font-weight: 500;
    color: var(--text-1);
    letter-spacing: 0.04em;
  }

  .col-header .spot-pill {
    font-family: 'IBM Plex Mono', monospace;
    font-size: 10px;
    font-weight: 500;
    color: var(--amber);
    background: rgba(212,168,67,0.1);
    border: 1px solid rgba(212,168,67,0.25);
    padding: 2px 8px;
    border-radius: 2px;
    letter-spacing: 0.03em;
  }

  /* ── TABLE HEADER ── */
  .tbl-head {
    display: grid;
    grid-template-columns: 60px 1fr 72px;
    padding: 7px 14px;
    background: var(--surface-2);
    border-bottom: 1px solid var(--border);
  }

  .tbl-head span {
    font-family: 'IBM Plex Mono', monospace;
    font-size: 8px;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    color: var(--text-3);
  }

  .th-mid { text-align: center; }
  .th-right { text-align: right; }

  /* ── ROWS ── */
  .row {
    display: grid;
    grid-template-columns: 60px 1fr 72px;
    align-items: center;
    min-height: 30px;
    padding: 0 14px;
    border-bottom: 1px solid var(--border-soft);
    transition: background 0.1s;
    position: relative;
  }

  .row:last-child { border-bottom: none; }
  .row:hover { background: rgba(255,255,255,0.015); }
  .row.flip-row { background: rgba(212,168,67,0.06); }

  .strike-col {
    font-family: 'IBM Plex Mono', monospace;
    font-size: 11px;
    font-weight: 500;
    color: var(--text-2);
    letter-spacing: 0.02em;
  }

  .row.flip-row .strike-col { color: var(--amber); }

  .net-col {
    font-family: 'IBM Plex Mono', monospace;
    font-size: 9px;
    text-align: right;
    letter-spacing: 0.02em;
  }

  .net-col.pos { color: var(--green); }
  .net-col.neg { color: var(--red); }

  /* ── BAR AREA ── */
  .bar-area {
    position: relative;
    height: 18px;
  }

  .axis-line {
    position: absolute;
    left: 50%;
    top: 2px; bottom: 2px;
    width: 1px;
    background: var(--border);
  }

  .bar-net {
    position: absolute;
    height: 8px;
    top: 50%;
    transform: translateY(-50%);
    border-radius: 1px;
  }

  .bar-net.pos { left: 50%; background: var(--green); opacity: 0.8; }
  .bar-net.neg { right: 50%; background: var(--red); opacity: 0.8; }

  .bar-call {
    position: absolute;
    height: 3px;
    top: calc(50% - 6px);
    left: 50%;
    background: var(--green);
    opacity: 0.18;
    border-radius: 1px;
  }

  .bar-put {
    position: absolute;
    height: 3px;
    bottom: calc(50% - 6px);
    right: 50%;
    background: var(--red);
    opacity: 0.18;
    border-radius: 1px;
  }

  /* ── SPOT LINE ── */
  .spot-line-wrap {
    position: relative;
    height: 1px;
    z-index: 5;
    overflow: visible;
  }

  .spot-line-inner {
    position: absolute;
    inset: 0;
    background: var(--amber);
    opacity: 0.55;
  }

  .spot-tag {
    position: absolute;
    right: 14px;
    top: -9px;
    font-family: 'IBM Plex Mono', monospace;
    font-size: 8px;
    color: var(--amber);
    background: var(--surface);
    border: 1px solid rgba(212,168,67,0.5);
    padding: 1px 5px;
    border-radius: 2px;
    letter-spacing: 0.05em;
    white-space: nowrap;
  }

  /* ── FLIP BADGE ── */
  .flip-badge {
    position: absolute;
    left: 50%;
    top: -8px;
    transform: translateX(-50%);
    font-family: 'IBM Plex Mono', monospace;
    font-size: 7px;
    letter-spacing: 0.06em;
    text-transform: uppercase;
    color: var(--blue);
    background: var(--surface-2);
    border: 1px solid rgba(77,143,234,0.3);
    padding: 1px 5px;
    border-radius: 2px;
    white-space: nowrap;
    z-index: 3;
  }

  /* ── CHART FOOTER ── */
  .chart-footer {
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding: 7px 14px;
    background: var(--surface-2);
    border-top: 1px solid var(--border);
  }

  .chart-footer span {
    font-family: 'IBM Plex Mono', monospace;
    font-size: 8px;
    color: var(--text-3);
    letter-spacing: 0.05em;
  }

  .footer-gex .fv { color: var(--green); }

  /* ── LEGEND ── */
  .legend {
    display: flex;
    align-items: center;
    gap: 14px;
    padding: 0 2px;
  }

  .legend-label {
    font-family: 'IBM Plex Mono', monospace;
    font-size: 8px;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    color: var(--text-3);
  }

  .legend-item {
    display: flex;
    align-items: center;
    gap: 5px;
    font-family: 'IBM Plex Mono', monospace;
    font-size: 8px;
    color: var(--text-2);
    letter-spacing: 0.04em;
  }

  .legend-pip {
    width: 14px;
    height: 3px;
    border-radius: 1px;
    flex-shrink: 0;
  }
</style>
</head>

function fmtGex(v) {
  const a = Math.abs(v), s = v >= 0 ? '+' : '−';
  if (a >= 1e9) return s + (a/1e9).toFixed(2) + 'B';
  if (a >= 1e6) return s + (a/1e6).toFixed(0) + 'M';
  return s + a.toFixed(0);
}

function fmtSpot(sym, v) {
  return sym === 'SPX'
    ? v.toLocaleString(undefined, {minimumFractionDigits:2, maximumFractionDigits:2})
    : v.toFixed(2);
}

function fmtStrike(sym, v) {
  return sym === 'SPX'
    ? v.toLocaleString()
    : v.toFixed(0);
}

  // col header
  const regimeLabel = isPos ? '+GEX' : '-GEX';
  const regimeColor = isPos ? 'var(--green)' : 'var(--red)';
  const regimeBg    = isPos ? 'rgba(45,200,138,0.08)' : 'rgba(224,82,82,0.08)';
  const regimeBorder= isPos ? 'rgba(45,200,138,0.25)' : 'rgba(224,82,82,0.25)';

  box.innerHTML = `
    <div class="col-header">
      <div style="display:flex;align-items:center;gap:8px;">
        <span class="sym">${inst.symbol}</span>
        <span style="font-family:'IBM Plex Mono',monospace;font-size:9px;font-weight:500;letter-spacing:0.08em;color:${regimeColor};background:${regimeBg};border:1px solid ${regimeBorder};padding:2px 7px;border-radius:2px;">${regimeLabel}</span>
      </div>
      <span class="spot-pill">${fmtSpot(inst.symbol, inst.spot)}</span>
    </div>
    <div class="tbl-head">
      <span>Strike</span>
      <span class="th-mid">← Put · Net GEX · Call →</span>
      <span class="th-right">Net GEX</span>
    </div>
  `;

  const rowContainer = document.createElement('div');
  const rowMap = {};

  // render rows highest → lowest
  [...inst.strikes].reverse().forEach(d => {
    const row = document.createElement('div');
    row.className = 'row' + (d.isFlip ? ' flip-row' : '');

    const isPos  = d.ng >= 0;
    const netW   = (Math.abs(d.ng) / maxNet)  * MAX;
    const callW  = (d.cg          / maxCall)  * MAX;
    const putW   = (Math.abs(d.pg)/ maxPut)   * MAX;

    const flipBadge = d.isFlip
      ? `<div class="flip-badge">γ ${fmtStrike(inst.symbol, inst.flip)}</div>`
      : '';

    row.innerHTML = `
      <div class="strike-col">${fmtStrike(inst.symbol, d.s)}</div>
      <div class="bar-area">
        <div class="axis-line"></div>
        <div class="bar-call" style="width:${callW}%"></div>
        <div class="bar-put"  style="width:${putW}%"></div>
        <div class="bar-net ${isPos ? 'pos' : 'neg'}"
             style="width:${netW}%;${isPos ? 'left:50%' : 'right:50%'}"></div>
        ${flipBadge}
      </div>
      <div class="net-col ${isPos ? 'pos' : 'neg'}">${fmtGex(d.ng)}</div>
    `;

    rowMap[d.s] = row;
    rowContainer.appendChild(row);
  });

  // inject spot line after the spot row
  if (spotIdx !== -1) {
    const spotStrike = inst.strikes[spotIdx].s;
    const refRow = rowMap[spotStrike];
    if (refRow) {
      const line = document.createElement('div');
      line.className = 'spot-line-wrap';
      line.innerHTML = `
        <div class="spot-line-inner"></div>
        <div class="spot-tag">SPOT ${fmtSpot(inst.symbol, inst.spot)}</div>
      `;
      refRow.parentNode.insertBefore(line, refRow.nextSibling);
    }
  }

  // footer at top — between col-header and tbl-head
  const footer = document.createElement('div');
  footer.className = 'chart-footer';
  footer.innerHTML = `
    <span>All expirations · ${inst.strikes.length} strikes</span>
    <span class="footer-gex">Net GEX: <span class="fv">${fmtGex(inst.netGex)}</span> · ${inst.regime}</span>
  `;
  box.insertBefore(footer, box.querySelector('.tbl-head'));

  box.appendChild(rowContainer);

  col.appendChild(box);
  grid.appendChild(col);
});

// ── legend — inserted before the grid ──
const legendWrap = document.createElement('div');
legendWrap.style.cssText = 'margin-bottom:14px; padding-bottom:12px; border-bottom:1px solid #1e2736;';
legendWrap.innerHTML = `
  <div class="legend">
    <span class="legend-label">Legend</span>
    <div class="legend-item"><div class="legend-pip" style="background:#2dc88a;opacity:0.8"></div>Positive net GEX</div>
    <div class="legend-item"><div class="legend-pip" style="background:#e05252;opacity:0.8"></div>Negative net GEX</div>
    <div class="legend-item"><div class="legend-pip" style="background:#2dc88a;opacity:0.18;height:2px"></div>Gross call GEX</div>
    <div class="legend-item"><div class="legend-pip" style="background:#e05252;opacity:0.18;height:2px"></div>Gross put GEX</div>
    <div class="legend-item"><div class="legend-pip" style="background:#d4a843;opacity:0.55;height:1px"></div>Spot price</div>
    <div class="legend-item"><div class="legend-pip" style="background:#4d8fea;opacity:0.55;height:1px"></div>Gamma flip</div>
  </div>
`;
document.body.insertBefore(legendWrap, grid);
</script>
</body>
</html>
